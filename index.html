<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-scale=1.0" />
  <title>Make It Right</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
   <!-- ===== SCREENS ===== -->

  <!-- Main Menu -->
  <div id="screen-menu" class="screen active">
    <div class="menu-bg-pattern"></div>
    <div class="menu-content">
      <div class="game-logo">
        <span class="logo-brain">Make</span>
        <span class="logo-it">It</span>
        <span class="logo-on">Right</span>
      </div>
      <p class="menu-tagline">Draw shapes. Solve puzzles. Use your brain.</p>
      <div class="menu-coins-display">
        <span class="coin-icon">●</span>
        <span id="menu-coin-count">0</span> coins
      </div>
      <div class="menu-buttons">
        <button class="btn btn-primary" onclick="Game.showScreen('level-select')">Play</button>
        <button class="btn btn-secondary" onclick="Game.showScreen('how-to-play')">How to Play</button>
      </div>
    </div>
  </div

  <script src="game.js"></script>
</body>
</html>
